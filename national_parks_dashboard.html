<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.S. National Parks Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #2a3441;
    --accent: #c8a96e;
    --accent2: #7fb069;
    --text: #e6e6e6;
    --text-muted: #7a8899;
    --text-dim: #3d4f63;
    --red: #d4634c;
    --panel-width: 380px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  #topbar { display: flex; align-items: center; gap: 10px; padding: 0 16px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  #logo { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--accent); letter-spacing: 0.02em; white-space: nowrap; margin-right: 6px; }
  #logo span { color: var(--text-muted); font-size: 11px; font-family: 'DM Mono', monospace; font-style: italic; }
  .filter-group { display: flex; align-items: center; gap: 8px; flex: 1; flex-wrap: wrap; }
  #search-wrap { position: relative; flex: 1; min-width: 140px; max-width: 220px; }
  #search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  #search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px 7px 30px; outline: none; transition: border-color 0.2s; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }
  select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px; outline: none; cursor: pointer; }
  #range-wrap { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  #year-range { accent-color: var(--accent); cursor: pointer; width: 100px; }
  #year-label { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); min-width: 36px; }
  #reset-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 7px 10px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  #reset-btn:hover { border-color: var(--red); color: var(--red); }
  #lang-btn { background: transparent; border: 1px solid var(--accent); border-radius: 6px; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; padding: 6px 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
  #lang-btn:hover { background: var(--accent); color: var(--bg); }

  #main { display: flex; flex: 1; overflow: hidden; position: relative; }
  #map { flex: 1; z-index: 1; }

  #sidebar { width: var(--panel-width); background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.3s ease; flex-shrink: 0; }
  #sidebar.collapsed { width: 0; }
  #sidebar-toggle { position: absolute; right: var(--panel-width); top: 50%; transform: translateY(-50%); z-index: 1000; background: var(--surface); border: 1px solid var(--border); border-right: none; border-radius: 6px 0 0 6px; color: var(--text-muted); padding: 10px 6px; cursor: pointer; transition: right 0.3s ease; font-size: 14px; }
  #sidebar-toggle.collapsed { right: 0; border-right: 1px solid var(--border); border-left: none; border-radius: 0 6px 6px 0; }

  #park-list-header { padding: 13px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #park-list-header h2 { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--accent); font-weight: 400; }
  #park-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
  #sort-bar { display: flex; padding: 9px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sort-btn { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 11px; padding: 5px 0; cursor: pointer; transition: all 0.15s; }
  .sort-btn:first-child { border-radius: 5px 0 0 5px; }
  .sort-btn:last-child { border-radius: 0 5px 5px 0; border-left: none; }
  .sort-btn:not(:first-child):not(:last-child) { border-left: none; }
  .sort-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  #park-list { overflow-y: auto; flex: 1; }
  #park-list::-webkit-scrollbar { width: 4px; }
  #park-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .park-item { padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; display: flex; gap: 9px; align-items: flex-start; }
  .park-item:hover { background: var(--surface2); }
  .park-item.active { background: #1e2a1e; border-left: 3px solid var(--accent2); }
  .park-rank { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); min-width: 20px; padding-top: 3px; }
  .park-item-body { flex: 1; min-width: 0; }
  .park-item-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .park-item-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 7px; }
  .park-item-state { color: var(--accent); font-weight: 500; }

  #detail-panel { position: absolute; bottom: 0; left: 0; right: var(--panel-width); background: var(--surface); border-top: 1px solid var(--border); max-height: 340px; display: none; flex-direction: column; z-index: 900; transition: right 0.3s ease; }
  #detail-panel.open { display: flex; }
  #detail-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 13px 18px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #detail-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); font-weight: 700; line-height: 1.2; }
  #detail-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-family: 'DM Mono', monospace; }
  #detail-close { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); cursor: pointer; padding: 4px 8px; font-size: 15px; flex-shrink: 0; margin-left: 10px; transition: all 0.15s; }
  #detail-close:hover { color: var(--red); border-color: var(--red); }
  #detail-body { padding: 12px 18px 14px; overflow-y: auto; display: grid; grid-template-columns: 185px 170px 1fr; gap: 16px; }
  #detail-body::-webkit-scrollbar { width: 4px; }
  #detail-body::-webkit-scrollbar-thumb { background: var(--border); }

  /* PHOTO */
  #detail-photo-col { display: flex; flex-direction: column; gap: 5px; }
  #detail-photo-wrap { position: relative; border-radius: 7px; overflow: hidden; height: 155px; background: var(--surface2); flex-shrink: 0; }
  #detail-photo { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.5s; }
  #detail-photo.loaded { opacity: 1; }
  #photo-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); font-size: 10px; gap: 5px; }
  #photo-credit { font-size: 9px; color: var(--text-dim); font-style: italic; text-align: center; }
  #photo-credit a { color: var(--text-dim); text-decoration: none; }
  #photo-credit a:hover { color: var(--text-muted); }

  .detail-stats { display: flex; flex-direction: column; gap: 9px; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 2px; }
  .stat-val { font-size: 13px; color: var(--text); font-weight: 500; }
  .stat-val .accent { color: var(--accent); }
  .stat-val .green { color: var(--accent2); }
  #detail-desc { font-size: 12.5px; line-height: 1.75; color: #b0bec5; overflow-y: auto; }
  #detail-desc strong { color: var(--accent); font-weight: 500; }

  .leaflet-container { background: #0d1117 !important; }
  .custom-marker { width: 10px; height: 10px; background: var(--accent2); border: 2px solid rgba(127,176,105,0.35); border-radius: 50%; cursor: pointer; transition: all 0.2s; }
  .custom-marker:hover, .custom-marker.highlight { background: var(--accent); border-color: rgba(200,169,110,0.5); transform: scale(1.5); }
  .custom-marker.dimmed { opacity: 0.12; }
  .leaflet-popup-content-wrapper { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 6px !important; color: var(--text) !important; box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important; }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 10px 14px !important; }
  .popup-name { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--accent); margin-bottom: 4px; }
  .popup-meta { font-size: 11px; color: var(--text-muted); }
  .popup-click { font-size: 10px; color: var(--text-dim); margin-top: 6px; font-style: italic; }

  #status-bar { position: absolute; bottom: 0; left: 0; right: var(--panel-width); height: 26px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 14px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); z-index: 800; }
  #status-bar span { color: var(--text-muted); }
  .legend { position: absolute; bottom: 34px; left: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; z-index: 800; font-size: 11px; color: var(--text-muted); }
  .legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

  @media (max-width: 768px) {
    :root { --panel-width: 0px; }
    #sidebar, #sidebar-toggle { display: none; }
    #detail-panel, #status-bar { right: 0 !important; }
    #detail-body { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div id="logo">National Parks <span>/ U.S. Explorer</span></div>
  <div class="filter-group">
    <div id="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search parks…" oninput="applyFilters()">
    </div>
    <select id="filter-state" onchange="applyFilters()">
      <option value="">All States</option>
    </select>
    <div id="range-wrap">
      <span id="lbl-est">Est. ≤</span>
      <input type="range" id="year-range" min="1872" max="2020" value="2020" step="1" oninput="updateYearLabel(); applyFilters()">
      <span id="year-label">2020</span>
    </div>
    <button id="reset-btn" onclick="resetFilters()">✕ Reset</button>
  </div>
  <button id="lang-btn" onclick="toggleLang()">中文</button>
</div>

<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <div id="park-list-header">
      <h2 id="lbl-parks">Parks</h2>
      <span id="park-count"></span>
    </div>
    <div id="sort-bar">
      <button class="sort-btn active" onclick="setSort('name',this)" id="sort-az">A–Z</button>
      <button class="sort-btn" onclick="setSort('rating',this)" id="sort-rating">Rating</button>
      <button class="sort-btn" onclick="setSort('year',this)" id="sort-year">Founded</button>
      <button class="sort-btn" onclick="setSort('visitors',this)" id="sort-visitors">Visitors</button>
    </div>
    <div id="park-list"></div>
  </div>
  <button id="sidebar-toggle" onclick="toggleSidebar()">◀</button>
</div>

<div id="detail-panel">
  <div id="detail-header">
    <div>
      <div id="detail-title">—</div>
      <div id="detail-subtitle">—</div>
    </div>
    <button id="detail-close" onclick="closeDetail()">✕</button>
  </div>
  <div id="detail-body">
    <div id="detail-photo-col">
      <div id="detail-photo-wrap">
        <div id="photo-placeholder">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.25"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span id="photo-loading-text">Loading…</span>
        </div>
        <img id="detail-photo" src="" alt="">
      </div>
      <div id="photo-credit"></div>
    </div>
    <div class="detail-stats" id="detail-stats"></div>
    <div id="detail-desc"></div>
  </div>
</div>

<div id="status-bar">
  <span id="status-coord">Hover map for coordinates</span>
  <span>·</span>
  <span id="status-visible"></span>
</div>

<div class="legend">
  <div><span class="legend-dot" style="background:#7fb069"></span><span id="lbl-legend-park">National Park</span></div>
  <div style="margin-top:5px"><span class="legend-dot" style="background:#c8a96e"></span><span id="lbl-legend-sel">Selected</span></div>
</div>

<script>
// ══════════════════════════════════════════
// I18N
// ══════════════════════════════════════════
const I18N = {
  en: {
    logo: 'National Parks', logoSub: '/ U.S. Explorer',
    search: 'Search parks…', allStates: 'All States', estBefore: 'Est. ≤', reset: '✕ Reset',
    parks: 'Parks', parksUnit: 'parks', visibleUnit: 'visible',
    sortAZ: 'A–Z', sortRating: 'Rating', sortYear: 'Founded', sortVisitors: 'Visitors',
    statRating: 'Rating', statVisitors: 'Annual Visitors', statArea: 'Area', statEst: 'Established', statState: 'State(s)',
    visitorsUnit: '/yr', clickExplore: 'Click to explore →',
    photoLoading: 'Loading photo…', photoVia: 'Photo via Wikimedia Commons', noPhoto: 'No photo available',
    hoverMap: 'Hover map for coordinates',
    legendPark: 'National Park', legendSel: 'Selected',
  },
  zh: {
    logo: '美国国家公园', logoSub: '/ 探索地图',
    search: '搜索公园…', allStates: '所有州', estBefore: '建立年份 ≤', reset: '✕ 重置',
    parks: '公园列表', parksUnit: '个公园', visibleUnit: '个显示中',
    sortAZ: 'A–Z', sortRating: '评分', sortYear: '建立年份', sortVisitors: '游客量',
    statRating: '评分', statVisitors: '年游客量', statArea: '面积', statEst: '建立年份', statState: '所在州',
    visitorsUnit: '/年', clickExplore: '点击查看详情 →',
    photoLoading: '图片加载中…', photoVia: '图片来源：维基百科', noPhoto: '暂无图片',
    hoverMap: '移动鼠标查看坐标',
    legendPark: '国家公园', legendSel: '已选中',
  }
};
let lang = 'en';
const T = k => I18N[lang][k] || I18N.en[k] || k;

function applyI18n() {
  document.getElementById('logo').innerHTML = `${T('logo')} <span>${T('logoSub')}</span>`;
  document.getElementById('search').placeholder = T('search');
  document.getElementById('filter-state').options[0].text = T('allStates');
  document.getElementById('lbl-est').textContent = T('estBefore');
  document.getElementById('reset-btn').textContent = T('reset');
  document.getElementById('lbl-parks').textContent = T('parks');
  document.getElementById('sort-az').textContent = T('sortAZ');
  document.getElementById('sort-rating').textContent = T('sortRating');
  document.getElementById('sort-year').textContent = T('sortYear');
  document.getElementById('sort-visitors').textContent = T('sortVisitors');
  document.getElementById('lbl-legend-park').textContent = T('legendPark');
  document.getElementById('lbl-legend-sel').textContent = T('legendSel');
  document.getElementById('status-coord').textContent = T('hoverMap');
  renderList();
  if (activeId) refreshDetailText();
}

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('lang-btn').textContent = lang === 'en' ? '中文' : 'EN';
  applyI18n();
}

// ══════════════════════════════════════════
// PARK DATA
// ══════════════════════════════════════════
const PARKS = [
  {id:1,name:"Yellowstone",zh:"黄石国家公园",state:"WY/MT/ID",lat:44.428,lng:-110.5885,year:1872,rating:4.9,visitors:4860000,acres:2219791,
   desc:"The world's first national park, established in 1872, sits atop one of Earth's largest volcanic hotspots. Yellowstone's geothermal features—over 10,000 hydrothermal sites including <strong>Old Faithful geyser</strong>—are unmatched anywhere on the planet. The park shelters one of North America's largest intact temperate ecosystems, home to grizzly bears, wolves reintroduced in 1995, bison herds, and elk. The Grand Prismatic Spring, the third largest hot spring in the world, dazzles with its vivid rainbow of microbial mats.",
   descZh:"黄石是世界第一个国家公园（1872年），坐落在地球上最大的火山热点之一。园内超过10,000处地热景观，其中<strong>老忠实间歇泉</strong>举世闻名。公园是北美最完整的温带生态系统之一，栖息着灰熊、狼（1995年重引入）、野牛和麋鹿。大棱镜彩泉是世界第三大温泉，以绚丽的彩虹微生物席著称。"},
  {id:2,name:"Grand Canyon",zh:"大峡谷国家公园",state:"AZ",lat:36.1069,lng:-112.1129,year:1919,rating:4.9,visitors:4730000,acres:1201647,
   desc:"Carved over 5–6 million years by the Colorado River, the Grand Canyon exposes nearly two billion years of Earth's geological history. Stretching <strong>277 miles long, up to 18 miles wide, and a mile deep</strong>, it is one of the most visually overwhelming landscapes on Earth. The Havasupai Tribe still calls the canyon floor home. The park draws visitors for mule rides, whitewater rafting, and the iconic Bright Angel Trail descent.",
   descZh:"科罗拉多河历经500至600万年雕刻，大峡谷长<strong>277英里、宽达18英里、深达1英里</strong>，揭示了近20亿年的地球地质历史。哈瓦苏派部落至今仍居住在峡谷底部。骡马骑行、漂流和光明天使步道是最受欢迎的体验。"},
  {id:3,name:"Great Smoky Mountains",zh:"大烟山国家公园",state:"TN/NC",lat:35.6532,lng:-83.507,year:1934,rating:4.8,visitors:12900000,acres:522427,
   desc:"The most visited national park in the United States, Great Smoky Mountains straddles the Tennessee–North Carolina border. Named for the <strong>blue-gray mist</strong> that perpetually shrouds the mountains, the park protects the world's finest examples of temperate deciduous forest. It harbors over 19,000 documented species and is a UNESCO World Heritage Site. Nineteen mountain peaks exceed 6,000 feet.",
   descZh:"美国访客最多的国家公园，横跨田纳西州和北卡罗来纳州边界。以笼罩山峰的<strong>蓝灰色薄雾</strong>得名，保护着世界最优质的温带落叶林。园内记录超过19,000个物种，是联合国教科文组织世界遗产地，19座山峰超过6,000英尺。"},
  {id:4,name:"Zion",zh:"锡安国家公园",state:"UT",lat:37.2982,lng:-113.0263,year:1919,rating:4.8,visitors:4690000,acres:147237,
   desc:"Zion's towering sandstone cliffs rise dramatically above the Virgin River, which carved the <strong>Zion Narrows</strong>—one of the world's great slot canyon hikes. Utah's first national park. The Angels Landing trail includes a final hair-raising scramble along a knife-edged ridge with chains bolted into the rock.",
   descZh:"维尔京河穿越壮观的砂岩峭壁，形成举世闻名的<strong>锡安峡谷</strong>槽谷徒步路线。犹他州第一个国家公园。天使降落步道沿刀刃山脊攀爬，铁链固定于岩壁，是公园系统中最刺激的徒步体验之一。"},
  {id:5,name:"Rocky Mountain",zh:"落基山国家公园",state:"CO",lat:40.3428,lng:-105.6836,year:1915,rating:4.7,visitors:4670000,acres:265807,
   desc:"Straddling the Continental Divide in northern Colorado. <strong>Trail Ridge Road</strong>, the highest continuous paved road in the U.S., reaches 12,183 feet and crosses 11 miles above treeline. About one-third of the park lies above treeline. Elk rut dramatically in September.",
   descZh:"横跨科罗拉多州北部大陆分水岭。<strong>山脊路</strong>是美国最高连续铺装公路，最高处12,183英尺，11英里路段位于树线以上。约三分之一面积超过11,000英尺。九月麋鹿发情期，鸣叫声响彻山谷。"},
  {id:6,name:"Acadia",zh:"阿卡迪亚国家公园",state:"ME",lat:44.3386,lng:-68.2733,year:1916,rating:4.8,visitors:4070000,acres:49052,
   desc:"The first national park established east of the Mississippi River, protecting Maine's stunning rocky Atlantic coastline. <strong>Cadillac Mountain</strong>, at 1,530 feet, is often the first place in the country to receive the sunrise. The 45-mile carriage road network built by John D. Rockefeller Jr. winds through the landscape.",
   descZh:"密西西比河以东第一个国家公园，保护缅因州壮美的大西洋岩石海岸。<strong>卡迪拉克山</strong>海拔1,530英尺，是美国大西洋沿岸最高点，部分季节是全美最先迎接日出之处。洛克菲勒家族捐建的45英里马车路贯穿全园。"},
  {id:7,name:"Olympic",zh:"奥林匹克国家公园",state:"WA",lat:47.8021,lng:-123.6044,year:1938,rating:4.8,visitors:3400000,acres:922651,
   desc:"Olympic encompasses three distinct ecosystems: glacier-capped mountains, one of the largest temperate rainforests in the Western Hemisphere, and 73 miles of wild Pacific coastline. The <strong>Hoh Rain Forest</strong> receives up to 12 feet of rain per year, creating a cathedral-like environment of mosses, ferns, and towering Sitka spruce.",
   descZh:"三种截然不同的生态系统并存：冰川山脉、西半球最大温带雨林之一，以及73英里原始太平洋海岸。<strong>霍雨林</strong>年降雨高达12英尺，苔藓、蕨类和巨杉构成大教堂般的景象。"},
  {id:8,name:"Glacier",zh:"冰川国家公园",state:"MT",lat:48.6961,lng:-113.718,year:1910,rating:4.9,visitors:3080000,acres:1013322,
   desc:"Known as the 'Crown of the Continent,' Glacier pairs with Canada's Waterton Lakes in the world's first International Peace Park. Once over 150 glaciers, climate change has reduced them to around 25. <strong>Going-to-the-Sun Road</strong>, a National Historic Landmark, crosses the Continental Divide at Logan Pass.",
   descZh:"被称为\"大陆之冠\"，与加拿大沃特顿湖共同构成世界第一个国际和平公园。曾有150多座冰川，气候变化后仅剩约25座。<strong>太阳路</strong>是国家历史地标，翻越大陆分水岭，是最著名的山地公路之一。"},
  {id:9,name:"Yosemite",zh:"优胜美地国家公园",state:"CA",lat:37.8651,lng:-119.5383,year:1890,rating:4.9,visitors:3667000,acres:759620,
   desc:"Yosemite Valley's sheer granite walls, thundering waterfalls, and ancient sequoias have inspired conservationists for over a century. <strong>El Capitan</strong>, a 3,000-foot sheer granite monolith, is the world's premier big-wall rock climbing destination. John Muir's writings moved President Theodore Roosevelt to camp here in 1903.",
   descZh:"峡谷花岗岩峭壁、瀑布和古老红杉林，百年来激励了无数环保人士。<strong>酋长岩</strong>是世界顶级大壁攀岩目的地。约翰·缪尔的描写促使罗斯福总统1903年亲临此地，大力推动联邦自然保护。"},
  {id:10,name:"Bryce Canyon",zh:"布莱斯峡谷国家公园",state:"UT",lat:37.593,lng:-112.1871,year:1928,rating:4.8,visitors:2600000,acres:35835,
   desc:"Bryce Canyon is a series of giant natural amphitheaters along the Paunsaugunt Plateau's edge. Its extraordinary collection of <strong>hoodoos</strong>—tall, thin spires of rock—glow orange, red, and pink with otherworldly beauty. At 8,000–9,000 feet elevation, Bryce offers some of the darkest skies in the lower 48 states.",
   descZh:"并非真正峡谷，而是沿高原边缘的天然圆形剧场。标志性的<strong>石笋柱</strong>——橙、红、粉色奇石尖塔——在蓝天下如梦似幻。高海拔（8,000–9,000英尺）使其成为美国本土最佳星空观测地之一。"},
  {id:11,name:"Grand Teton",zh:"大提顿国家公园",state:"WY",lat:43.7904,lng:-110.6818,year:1929,rating:4.8,visitors:3200000,acres:310044,
   desc:"The Teton Range rises abruptly from the valley floor without foothills, making its jagged peaks seem improbably dramatic. <strong>Grand Teton</strong>, at 13,775 feet, offers world-class technical climbing. Contiguous with Yellowstone, forming one of the largest intact temperate ecosystems in the world.",
   descZh:"提顿山脉从山谷骤然拔起，无丘陵过渡，锯齿状山峰格外壮观。<strong>大提顿峰</strong>海拔13,775英尺，是世界顶级技术攀登目的地。与黄石相邻，共同构成世界最大完整温带生态系统之一。"},
  {id:12,name:"Joshua Tree",zh:"约书亚树国家公园",state:"CA",lat:33.8734,lng:-115.901,year:1994,rating:4.7,visitors:3400000,acres:795155,
   desc:"Joshua Tree straddles two distinct desert ecosystems. The park's namesake <strong>Joshua trees</strong> (giant yuccas) inspired Bono and U2 to name their landmark 1987 album after them. The granite monolith formations are a world-renowned rock climbing mecca and one of the best places in the Southwest to view the Milky Way.",
   descZh:"横跨莫哈韦和科罗拉多两个沙漠生态系统。标志性的<strong>约书亚树</strong>（巨型丝兰）启发了U2乐队同名专辑。花岗岩巨石群是世界知名攀岩圣地，也是西南部最佳银河观测地之一。"},
  {id:13,name:"Shenandoah",zh:"谢南多厄国家公园",state:"VA",lat:38.5334,lng:-78.3499,year:1935,rating:4.6,visitors:1600000,acres:199018,
   desc:"Shenandoah stretches along Virginia's Blue Ridge Mountains. <strong>Skyline Drive</strong>, 105 miles long with 75 overlooks, offers sweeping views over the Shenandoah Valley and Virginia Piedmont. Over 500 miles of trails, including a major section of the Appalachian Trail.",
   descZh:"沿弗吉尼亚州蓝岭山脉延伸。<strong>天际线大道</strong>全长105英里，75处俯瞰点可远眺谢南多厄河谷和弗吉尼亚皮埃蒙特地区。超过500英里步道，含阿巴拉契亚小径重要路段。"},
  {id:14,name:"Arches",zh:"拱门国家公园",state:"UT",lat:38.7331,lng:-109.5925,year:1971,rating:4.7,visitors:1800000,acres:76679,
   desc:"Arches contains the world's densest concentration of natural stone arches—over 2,000 catalogued spans. <strong>Delicate Arch</strong>, perched at the rim of a canyon with the La Sal Mountains as backdrop, is one of the most photographed natural landmarks in the United States and appears on the Utah license plate.",
   descZh:"世界最密集的天然石拱汇集地，超过2,000座已编目。<strong>精美拱门</strong>矗立峡谷边缘，以拉萨尔山脉为背景，是美国最具代表性的自然地标之一，也是犹他州车牌的标志。"},
  {id:15,name:"Canyonlands",zh:"峡谷地国家公园",state:"UT",lat:38.2136,lng:-109.8782,year:1964,rating:4.7,visitors:775000,acres:337598,
   desc:"Canyonlands, Utah's largest national park, is carved by the Colorado and Green Rivers into three districts—Island in the Sky, The Needles, and The Maze. <strong>Island in the Sky</strong>, a mesa perched 1,000 feet above the canyon floor, offers sweeping vistas that dwarf even the Grand Canyon.",
   descZh:"犹他州最大国家公园，由科罗拉多河和格林河雕刻为三区。<strong>天空岛</strong>高于峡谷底部1,000英尺，俯瞰视野甚至超过大峡谷。迷宫区是美国本土最难到达的地方之一。"},
  {id:16,name:"Death Valley",zh:"死亡谷国家公园",state:"CA/NV",lat:36.5054,lng:-117.0794,year:1994,rating:4.6,visitors:1600000,acres:3373063,
   desc:"Death Valley is the largest national park in the contiguous U.S. and the hottest, driest, and lowest. <strong>Badwater Basin</strong>, at 282 feet below sea level, is the lowest point in North America. The valley holds the world record for highest reliably recorded air temperature: 134°F (56.7°C) in 1913.",
   descZh:"美国本土最大、最热、最干燥、海拔最低的国家公园。<strong>恶水盆地</strong>低于海平面282英尺，是北美最低点。1913年创下134°F（56.7°C）的世界最高可靠气温纪录。雨年中，死亡谷会迎来壮观的野花超级盛开。"},
  {id:17,name:"Sequoia",zh:"红杉国家公园",state:"CA",lat:36.4864,lng:-118.5658,year:1890,rating:4.8,visitors:1059000,acres:404051,
   desc:"Sequoia protects some of the largest living organisms on Earth. <strong>General Sherman Tree</strong>, measuring 36 feet in diameter at its base and 274 feet tall, is the world's largest tree by volume at 52,500 cubic feet. Giant sequoias can live over 3,000 years and only regenerate their seeds in the heat of a wildfire.",
   descZh:"保护地球上最大的生命体。<strong>谢尔曼将军树</strong>底部直径36英尺，高274英尺，体积52,500立方英尺，是全球体积最大的树。巨型红杉可活3,000年以上，其种子只在野火高温中才能萌发。"},
  {id:18,name:"Kings Canyon",zh:"国王峡谷国家公园",state:"CA",lat:36.8879,lng:-118.5551,year:1940,rating:4.7,visitors:632000,acres:461901,
   desc:"Adjacent to Sequoia, Kings Canyon preserves the massive Kings River canyon system. <strong>Kings Canyon</strong> is in some places deeper than the Grand Canyon. Far less visited than Sequoia, it is a haven for solitude-seekers. The General Grant Tree is the second-largest tree on Earth.",
   descZh:"与红杉国家公园相邻，保护宏伟的国王河峡谷体系。<strong>国王峡谷</strong>在某些地方比大峡谷还深。游客远少于邻近的红杉公园，是寻求宁静的理想之地。格兰特将军树是地球上第二大树木。"},
  {id:19,name:"Mount Rainier",zh:"雷尼尔山国家公园",state:"WA",lat:46.88,lng:-121.7269,year:1899,rating:4.8,visitors:1600000,acres:236381,
   desc:"Mount Rainier, at 14,411 feet the highest Cascade peak, supports <strong>26 named glaciers</strong> containing more glacial ice than any other peak in the lower 48 states. In summer, vast subalpine meadows explode with wildflowers. The Wonderland Trail is a celebrated 93-mile circuit of the mountain.",
   descZh:"雷尼尔山海拔14,411英尺，是喀斯喀特山脉最高峰，支撑着<strong>26座命名冰川</strong>，冰量超过阿拉斯加以外美国本土任何山峰。夏季亚高山草甸野花盛放。93英里奇观小径是环绕此山的著名徒步路线。"},
  {id:20,name:"Crater Lake",zh:"火山口湖国家公园",state:"OR",lat:42.9446,lng:-122.109,year:1902,rating:4.8,visitors:770000,acres:183224,
   desc:"Crater Lake occupies the caldera of Mount Mazama, which collapsed roughly 7,700 years ago. At 1,943 feet, it is the deepest lake in the United States. Fed solely by rain and snowmelt, the lake has <strong>extraordinary water clarity and an intense supernatural blue</strong> unequaled in North America.",
   descZh:"占据马扎马山约7,700年前喷发塌陷的火山口。湖深1,943英尺，是美国最深的湖泊。湖水完全由雨雪补给，拥有<strong>无与伦比的湛蓝清澈</strong>，为北美之最。湖中精灵岛是一座从湖面升起767英尺的火山渣锥。"},
  {id:21,name:"Everglades",zh:"大沼泽地国家公园",state:"FL",lat:25.2866,lng:-80.8987,year:1947,rating:4.5,visitors:1100000,acres:1509153,
   desc:"The Everglades is the only subtropical preserve in North America. Often called a 'river of grass,' it is a slow-moving sheet of water flowing through sawgrass and mangrove forest. The park shelters 36 threatened species including the Florida panther, West Indian manatee, and the American crocodile—one of the only places alligators and crocodiles coexist.",
   descZh:"北美唯一的亚热带保护区，常被称为\"草之河\"，实为缓慢南流的浅水草原和红树林。栖息着36种受威胁物种，包括佛罗里达山狮、西印度海牛和美国鳄——世界上极少数鳄鱼与短吻鳄共存的地方之一。"},
  {id:22,name:"Hawaii Volcanoes",zh:"夏威夷火山国家公园",state:"HI",lat:19.4194,lng:-155.2885,year:1916,rating:4.8,visitors:1200000,acres:323431,
   desc:"Hawaii Volcanoes encompasses two of the world's most active volcanoes—<strong>Kīlauea</strong>, continuously erupting since 1983, and Mauna Loa, the world's largest shield volcano. The park offers the rare opportunity to witness volcanic creation in real time. The park spans from sea level to 13,677 feet.",
   descZh:"涵盖两座世界最活跃火山——<strong>基拉韦厄</strong>（自1983年持续喷发）和世界最大盾状火山冒纳罗亚。提供亲眼目睹熔岩创造新土地的机会。园区从海平面延伸至13,677英尺，涵盖热带雨林至高山沙漠。"},
  {id:23,name:"Denali",zh:"德纳利国家公园",state:"AK",lat:63.1148,lng:-151.1926,year:1917,rating:4.9,visitors:601000,acres:6045153,
   desc:"Denali, at 20,310 feet, is the highest peak in North America. The national park is one of the premier wilderness areas in the world—<strong>93% of it is roadless</strong>. The single 92-mile park road is open only to permitted buses beyond 15 miles. Denali is home to Alaska's 'Big Five': grizzly bears, moose, Dall sheep, wolves, and caribou.",
   descZh:"德纳利峰海拔20,310英尺，是北美最高峰。国家公园是世界顶级荒野区之一——<strong>93%无路可通</strong>。唯一一条92英里公路15英里后仅对许可巴士开放。可观察阿拉斯加\"大五\"：灰熊、驼鹿、道尔盘羊、狼和驯鹿。"},
  {id:24,name:"Glacier Bay",zh:"冰川湾国家公园",state:"AK",lat:58.6658,lng:-136.9,year:1980,rating:4.8,visitors:75000,acres:3280198,
   desc:"Glacier Bay is one of the world's most dramatic examples of post-glacial rebound: just 250 years ago the entire bay was covered by a massive glacier. Today, 50 named glaciers descend from the peaks, including the massive <strong>Grand Pacific Glacier</strong>. A UNESCO World Heritage Site.",
   descZh:"全球最戏剧化的冰川后退实例之一：仅250年前，整个海湾被一座巨大冰川覆盖。如今50座命名冰川俯冲而下，包括宏伟的<strong>大太平洋冰川</strong>。联合国教科文组织世界遗产地。座头鲸、虎鲸、海獭繁盛于此。"},
  {id:25,name:"Katmai",zh:"卡特迈国家公园",state:"AK",lat:58.5,lng:-154.0,year:1980,rating:4.8,visitors:75000,acres:4093077,
   desc:"Katmai is renowned worldwide for <strong>Brooks Falls</strong>, where every July brown bears congregate to catch sockeye salmon leaping upstream. The park hosts one of the highest concentrations of brown bears in the world, and its annual 'Fat Bear Week' contest has become a beloved internet phenomenon.",
   descZh:"因<strong>布鲁克斯瀑布</strong>享誉全球——每年七月棕熊聚集捕食跃瀑红鲑鱼。公园拥有世界上最高密度的棕熊聚集地之一，年度\"胖熊周\"评选已成为广受欢迎的网络现象。"},
  {id:26,name:"Kenai Fjords",zh:"基奈峡湾国家公园",state:"AK",lat:59.9198,lng:-150.0,year:1980,rating:4.8,visitors:340000,acres:669984,
   desc:"Kenai Fjords is named for dramatic fjords carved along the Gulf of Alaska. The park is dominated by the <strong>Harding Icefield</strong>, one of the largest ice fields in the U.S., which feeds over 40 glaciers. Exit Glacier, the park's only road-accessible glacier, retreats visibly year by year.",
   descZh:"以阿拉斯加湾沿岸冰川雕刻的壮观峡湾命名。<strong>哈丁冰原</strong>是美国最大冰原之一，滋养40多座冰川。出口冰川是公园内唯一可驾车直达的冰川，每年可见明显后退。"},
  {id:27,name:"Wrangell-St. Elias",zh:"兰格尔-圣伊莱亚斯国家公园",state:"AK",lat:61.7104,lng:-142.9856,year:1980,rating:4.8,visitors:80000,acres:13175799,
   desc:"Wrangell–St. Elias is the largest national park in the United States—larger than Switzerland—with 13.2 million acres of pristine wilderness. Nine of the sixteen highest U.S. peaks are here, along with the largest collection of glaciers in North America, including the 92-mile <strong>Bagley Icefield</strong>.",
   descZh:"美国最大的国家公园，面积超过整个瑞士，拥有1,320万英亩原始山地荒野。美国16座最高峰中的9座在此，以及北美最大冰川群，包括92英里长的<strong>贝格利冰原</strong>。"},
  {id:28,name:"Biscayne",zh:"比斯坎国家公园",state:"FL",lat:25.4824,lng:-80.4078,year:1980,rating:4.5,visitors:700000,acres:172924,
   desc:"Biscayne National Park is 95% water, protecting the northern Florida Keys reef system. The park contains four ecosystems including the third largest <strong>coral reef</strong> in the world. It is a paddler's paradise with an extensive canoe trail and excellent diving and snorkeling.",
   descZh:"95%为水域，保护佛罗里达礁岛群北端的礁石系统。包含四种生态系统，拥有世界第三大<strong>珊瑚礁</strong>。是皮划艇爱好者的天堂，水下沉船遗址深受潜水者喜爱。"},
  {id:29,name:"Dry Tortugas",zh:"干托尔图加斯国家公园",state:"FL",lat:24.6285,lng:-82.8732,year:1992,rating:4.9,visitors:73000,acres:64701,
   desc:"Accessible only by boat or seaplane, Dry Tortugas sits 70 miles west of Key West. At its heart is <strong>Fort Jefferson</strong>, a massive 19th-century military fortification covering 16 acres—one of the largest brick structures in the Western Hemisphere. The surrounding waters contain spectacular coral reefs and sea turtle habitat.",
   descZh:"距基韦斯特70英里，只能乘船或水上飞机到达，是美国本土最偏远的国家公园之一。核心是<strong>杰斐逊堡</strong>，一座占地16英亩的巨大19世纪军事堡垒，是西半球最大的砖砌建筑之一。周边水域拥有壮观的珊瑚礁和海龟栖息地。"},
  {id:30,name:"Carlsbad Caverns",zh:"卡尔斯巴德洞窟国家公园",state:"NM",lat:32.1479,lng:-104.5567,year:1930,rating:4.8,visitors:460000,acres:46766,
   desc:"Carlsbad Caverns contains over 100 caves. The Big Room, at 4,000 feet long and 255 feet high, is one of the largest cave chambers in North America. The park is world-famous for its <strong>Brazilian free-tailed bat colony</strong>: from May through October, hundreds of thousands of bats stream from the entrance at dusk.",
   descZh:"拥有100多个洞穴，\"大厅\"长4,000英尺、高255英尺，是北美最大的洞穴厅之一。因每年5至10月傍晚的<strong>巴西游离尾蝠大迁徙</strong>举世闻名——数十万只蝙蝠螺旋飞出，场面壮观持续数小时。"},
  {id:31,name:"Guadalupe Mountains",zh:"瓜达卢佩山国家公园",state:"TX",lat:31.9231,lng:-104.8713,year:1972,rating:4.6,visitors:195000,acres:86367,
   desc:"Guadalupe Mountains contains the world's most extensive Permian fossil reef, formed 250 million years ago. <strong>Guadalupe Peak</strong>, at 8,749 feet, is the highest point in Texas. The park receives very few visitors and offers genuine solitude. Fall brings color as maples in McKittrick Canyon turn red and gold.",
   descZh:"保存着世界最广泛的二叠纪化石礁，形成于2.5亿年前。<strong>瓜达卢佩峰</strong>海拔8,749英尺，是德克萨斯州最高点。游客极少，提供真正的荒野孤独感。秋天麦基特里克峡谷的枫叶变为鲜红金黄。"},
  {id:32,name:"Big Bend",zh:"大弯国家公园",state:"TX",lat:29.1275,lng:-103.2425,year:1944,rating:4.8,visitors:581000,acres:801163,
   desc:"Big Bend occupies the great bend of the Rio Grande in remote southwest Texas, bordering Mexico for 118 miles. Dramatic landscapes include the <strong>Chisos Mountains</strong>, rising as an island of woodland in a sea of desert. The park has some of the darkest skies in the U.S. Over 450 species of birds recorded here—more than any other national park.",
   descZh:"占据里奥格兰德河在西德克萨斯州的大拐弯，与墨西哥接壤118英里。包括<strong>奇索斯山脉</strong>——沙漠中的一座凉爽山林孤岛。拥有美国最暗的天空之一，超过450种鸟类记录在此，位居所有国家公园之首。"},
  {id:33,name:"Saguaro",zh:"萨瓜罗国家公园",state:"AZ",lat:32.2967,lng:-110.9739,year:1994,rating:4.6,visitors:1200000,acres:92867,
   desc:"Saguaro National Park, split into two districts flanking Tucson, protects the iconic Sonoran Desert landscape and specifically the <strong>saguaro cactus</strong>—the largest cactus in the United States, which can live over 150 years and grow to 40 feet. Saguaros are keystone species providing food and shelter for an enormous range of wildlife.",
   descZh:"分为东西两区拱卫图森市，保护标志性的索诺兰沙漠景观，尤其是<strong>巨人柱仙人掌</strong>——美国最大的仙人掌，可活150年以上，高达40英尺。巨人柱是索诺兰沙漠生态系统的关键物种。"},
  {id:34,name:"Petrified Forest",zh:"石化林国家公园",state:"AZ",lat:34.9823,lng:-109.8872,year:1962,rating:4.5,visitors:644000,acres:221390,
   desc:"Petrified Forest preserves the world's largest concentration of petrified wood—ancient logs replaced by silica-rich groundwater 225 million years ago. The <strong>Painted Desert</strong> along the park's northern edge is a landscape of badlands striped in lavender, red, orange, and pink.",
   descZh:"保存着世界最大密度的硅化木——2.25亿年前的古树被富含硅的地下水缓慢替代，以绚丽的多彩石英晶体形式保存。公园北缘的<strong>彩绘沙漠</strong>以薰衣草、红色、橙色和粉红色条纹地貌令人过目难忘。"},
  {id:35,name:"Mesa Verde",zh:"梅萨维德国家公园",state:"CO",lat:37.1836,lng:-108.4912,year:1906,rating:4.8,visitors:570000,acres:52485,
   desc:"Mesa Verde, a UNESCO World Heritage Site, preserves the most notable ancestral Puebloan cliff dwellings in North America. <strong>Cliff Palace</strong>, with 150 rooms and 23 kivas, is the largest cliff dwelling in North America, tucked into a sandstone alcove. The site spans 700 years of habitation from 600 to 1300 CE.",
   descZh:"联合国教科文组织世界遗产地，保存着北美最著名的古代普韦布洛人悬崖居所。<strong>悬崖宫殿</strong>有150个房间和23个基瓦，是北美最大的悬崖居所，嵌在砂岩壁龛中。遗址涵盖公元600至1300年约700年的居住史。"},
  {id:36,name:"Black Canyon of the Gunnison",zh:"冈尼森黑峡谷国家公园",state:"CO",lat:38.5754,lng:-107.7416,year:1999,rating:4.8,visitors:437000,acres:32950,
   desc:"Black Canyon contains some of the steepest cliffs, oldest rock, and most dramatic geology of any national park. The Gunnison River drops 43 feet per mile, carving walls over 2,700 feet high. Some sections receive <strong>only 33 minutes of direct sunlight per day</strong>. The Painted Wall, at 2,250 feet, is Colorado's tallest cliff.",
   descZh:"冈尼森河平均每英里下降43英尺，雕刻出高达2,700英尺的峡谷壁，是全美最陡峭的峡谷之一。某些地段<strong>每天只有33分钟</strong>的直射阳光。2,250英尺的彩绘壁是科罗拉多州最高悬崖。"},
  {id:37,name:"Great Sand Dunes",zh:"大沙丘国家公园",state:"CO",lat:37.7328,lng:-105.5943,year:2004,rating:4.7,visitors:592000,acres:107342,
   desc:"Great Sand Dunes preserves the tallest sand dunes in North America, rising over 750 feet against the Sangre de Cristo Mountains. <strong>Medano Creek</strong>, which flows seasonally at the dunes' base, creates surge flow—waves of water pulsing along the creek—making it a popular wading area in late spring.",
   descZh:"保存着北美最高的沙丘，在桑格雷德克里斯托山脉衬托下高达750英尺以上。<strong>梅达诺溪</strong>春季在沙丘底部形成\"涌浪流\"，是受欢迎的浅水嬉水区。早晨和傍晚光线斜射时沙丘景色最为迷人。"},
  {id:38,name:"Wind Cave",zh:"风洞国家公园",state:"SD",lat:43.5564,lng:-103.478,year:1903,rating:4.6,visitors:614000,acres:33847,
   desc:"Wind Cave is one of the longest and most complex caves in the world with over 150 miles of mapped passages. The cave is renowned for its <strong>boxwork</strong>—a rare formation of thin calcite blades projecting in honeycomb patterns found in no other cave in such abundance. The surface prairie supports bison, elk, and black-footed ferrets.",
   descZh:"世界最长、最复杂的洞穴之一，已探明超过150英里通道。以罕见的矿物形成物<strong>方格纹</strong>著称——薄方解石叶片形成蜂巢状图案，在其他洞穴中极为罕见。地面上的草原栖息着野牛、麋鹿和珍稀的黑足貂。"},
  {id:39,name:"Badlands",zh:"荒地国家公园",state:"SD",lat:43.8554,lng:-102.3397,year:1978,rating:4.7,visitors:1040000,acres:242756,
   desc:"The Badlands are a constantly eroding landscape of sharply carved spires, buttes, and pinnacles. The park contains one of the world's richest fossil beds of Oligocene epoch mammals from 23–34 million years ago, including <strong>three-toed horses, saber-toothed cats, and giant tortoises</strong>.",
   descZh:"不断侵蚀的灰、白、棕、锈色沉积岩尖塔、土丘和石柱，地貌每年侵蚀约一英寸。拥有距今2,300至3,400万年前的奥利戈世哺乳动物<strong>最丰富的化石床</strong>之一，包括三趾马、剑齿猫和巨型陆龟。"},
  {id:40,name:"Theodore Roosevelt",zh:"西奥多·罗斯福国家公园",state:"ND",lat:46.9793,lng:-103.5387,year:1978,rating:4.7,visitors:750000,acres:70447,
   desc:"Theodore Roosevelt National Park is named for the president who drew inspiration from the North Dakota Badlands in the 1880s after the death of his first wife. The park preserves the Little Missouri Badlands and <strong>Elkhorn Ranch</strong>, the site of Roosevelt's homestead. Wild bison, feral horses, elk, and bighorn sheep roam freely.",
   descZh:"以这位总统命名，他在1880年代丧妻后来到北达科他州荒地寻求慰藉。保护小密苏里荒地粗犷之美和罗斯福原牧场<strong>角叉牧场</strong>遗址。野牛、野马、麋鹿和大角羊自由漫步。罗斯福曾说：\"若不是在这里的经历，我不可能成为总统。\""},
  {id:41,name:"Voyageurs",zh:"沃雅格国家公园",state:"MN",lat:48.4839,lng:-92.8284,year:1975,rating:4.6,visitors:241000,acres:218222,
   desc:"Voyageurs is a water-based national park accessible primarily by boat or canoe. Named for the <strong>French-Canadian voyageurs</strong> who paddled these waters in birch-bark canoes during the fur trade era. The park is one of the best places in the lower 48 to see the northern lights. Walleye and northern pike fishing is world-class.",
   descZh:"以水上活动为主的国家公园，以乘桦树皮独木舟进行毛皮贸易的<strong>法裔加拿大探险者</strong>命名。是美国本土观赏北极光的最佳地点之一，湖中鳟鲈和北梭鱼举世闻名。"},
  {id:42,name:"Isle Royale",zh:"罗亚尔岛国家公园",state:"MI",lat:48.0056,lng:-88.837,year:1940,rating:4.7,visitors:27000,acres:571790,
   desc:"Isle Royale is the least visited national park in the contiguous U.S., a remote island in Lake Superior accessible only by ferry or seaplane. Famous for hosting one of the world's longest-running predator-prey studies: the <strong>wolves and moose of Isle Royale</strong>, studied continuously since 1958.",

  {id:43,name:"Cuyahoga Valley",zh:"凯霍加谷国家公园",state:"OH",lat:41.2808,lng:-81.5678,year:2000,rating:4.6,visitors:2800000,acres:32861,

   descZh:"俄亥俄州唯一的国家公园，沿凯霍加河保护33,000英亩土地。<strong>俄亥俄-伊利运河船道步道</strong>是中西部最受欢迎的多用途步道之一。凯霍加谷观光铁路提供穿越山谷的解说游览。"},
  {id:44,name:"Indiana Dunes",zh:"印第安纳沙丘国家公园",state:"IN",lat:41.653,lng:-87.0522,year:2019,rating:4.5,visitors:2100000,acres:15349,

  {id:45,name:"Mammoth Cave",zh:"猛犸洞穴国家公园",state:"KY",lat:37.1877,lng:-86.1002,year:1941,rating:4.7,visitors:600000,acres:52830,

  {id:46,name:"New River Gorge",zh:"新河峡谷国家公园",state:"WV",lat:37.8679,lng:-80.998,year:2020,rating:4.8,visitors:1630000,acres:72808,

  {id:47,name:"Capitol Reef",zh:"国会礁国家公园",state:"UT",lat:38.2,lng:-111.2135,year:1971,rating:4.7,visitors:1220000,acres:241904,
   desc:"Capitol Reef is centered on the <strong>Waterpocket Fold</strong>—a 100-mile-long warp in the earth's crust exposing a rainbow of geological history. The historic Fruita district preserves a Mormon pioneer orchard where visitors can still pick apples, peaches, pears, and cherries in season.",
   descZh:"公园核心是<strong>水袋折叠</strong>——地壳中100英里长的弯曲褶皱，将岩层剧烈上推，呈现地质历史的彩虹。弗鲁塔历史区保留了摩门垦殖者果园，游客至今可在季节采摘苹果、桃子和梨。"},
  {id:48,name:"Channel Islands",zh:"海峡群岛国家公园",state:"CA",lat:34.0069,lng:-119.7785,year:1980,rating:4.7,visitors:490000,acres:249562,
   desc:"Channel Islands protects five of California's eight Channel Islands. The park is sometimes called the '<strong>Galápagos of North America</strong>' for its high level of endemism. Island fox, pygmy mammoth fossils, and the endemic island scrub-jay are among its treasures. The waters are extraordinarily productive: blue whales, humpbacks, and vast kelp forests.",
   descZh:"保护加州八个海峡岛屿中的五个，有时被称为\"<strong>北美的加拉帕戈斯</strong>\"，因其极高的地方特有种水平。岛屿狐、侏儒猛犸象化石是其生物瑰宝。周边水域蓝鲸、座头鲸和广阔海藻森林共同繁盛。"},
  {id:49,name:"Redwood",zh:"红木国家公园",state:"CA",lat:41.2132,lng:-124.0046,year:1968,rating:4.8,visitors:460000,acres:138999,
   desc:"Redwood National and State Parks jointly protect the tallest trees on Earth—coastal redwoods that can exceed 380 feet and live 2,000 years. The parks contain approximately 45% of all remaining old-growth coastal redwood forest. The tallest known living tree, <strong>Hyperion</strong> at 380.3 feet, stands in an undisclosed location.",
   descZh:"共同保护地球上最高的树木——海岸红木，高度可超380英尺，寿命超2,000年。保存约45%的现存老龄海岸红木林。已知最高活树<strong>亥伯龙（Hyperion）</strong>高达380.3英尺，确切位置保密以防踩踏。"},
  {id:50,name:"Lassen Volcanic",zh:"拉森火山国家公园",state:"CA",lat:40.4977,lng:-121.5081,year:1916,rating:4.7,visitors:544000,acres:106589,
   desc:"Lassen Volcanic National Park contains all four types of volcanoes—plug dome, shield, cinder cone, and composite—making it a unique geological laboratory. <strong>Lassen Peak</strong>, the world's largest plug dome volcano, last erupted in 1915. The park's hydrothermal areas bubble and steam like a smaller Yellowstone.",
   descZh:"包含所有四种类型的火山——堵塞穹丘、盾状火山、火山渣锥和复式火山，是独特的地质实验室。<strong>拉森峰</strong>是世界最大堵塞穹丘火山，最后喷发于1915年。班帕斯地狱等地热区像迷你版的黄石翻腾咝响。"},
  {id:51,name:"Pinnacles",zh:"尖石国家公园",state:"CA",lat:36.4906,lng:-121.1825,year:2013,rating:4.6,visitors:250000,acres:42695,
   desc:"Pinnacles protects the eroded remnants of an ancient volcano transported 195 miles by the San Andreas Fault. The park is one of only a few places with <strong>talus caves</strong>—caves formed by piles of fallen boulders. These caves are a critical roost site for the California condor, and Pinnacles hosts one of the most successful condor reintroduction programs.",
   descZh:"保护沿圣安德烈亚斯断层移动了195英里的古火山侵蚀残余。公园是少数几个拥有<strong>砾石洞</strong>的地方之一——由倒塌巨石堆形成的洞穴。这里是濒危加州神鹫的关键栖息地，神鹫重引入计划成果卓著。"},
  {id:52,name:"North Cascades",zh:"北喀斯喀特国家公园",state:"WA",lat:48.7718,lng:-121.2985,year:1968,rating:4.8,visitors:38000,acres:504655,
   desc:"North Cascades has been called the 'American Alps' for its rugged, glaciated terrain—the park contains more glaciers than any other area in the lower 48 outside of Alaska. Yet it is one of the <strong>least visited national parks</strong> in the contiguous U.S. Wolves have returned to the park naturally in recent years.",
   descZh:"被誉为\"美洲阿尔卑斯\"，拥有阿拉斯加以外美国本土最多的冰川。却是美国本土<strong>游客最少的国家公园之一</strong>，是寻求真正孤独的荒野旅行者天堂。近年来，狼群已自然回迁至公园。"},
  {id:53,name:"Congaree",zh:"康加里国家公园",state:"SC",lat:33.7948,lng:-80.782,year:2003,rating:4.6,visitors:165000,acres:26546,
   desc:"Congaree protects the largest tract of old-growth bottomland hardwood forest in the United States. The floodplain forest contains some of the tallest trees in the eastern U.S., and the park holds multiple <strong>state and national champion trees</strong>. The park's firefly display in late spring—synchronous fireflies flashing in coordinated patterns—draws visitors worldwide.",
   descZh:"保护美国最大的老龄低地硬木林。洪泛平原森林包含东部美国最高的部分树木，持有多项<strong>州和全国冠军树</strong>称号。每年春末，萤火虫同步闪光的自然奇观吸引全球游客。"},
  {id:54,name:"Hot Springs",zh:"热泉国家公园",state:"AR",lat:34.5217,lng:-93.0542,year:1921,rating:4.5,visitors:1540000,acres:5554,
   desc:"Hot Springs is both one of the oldest and smallest national parks, protecting thermal springs that emerge at 143°F. The springs were a federal reservation since 1832. The famous <strong>Bathhouse Row</strong>—eight ornate bathhouses built between 1892 and 1923—once attracted presidents, gangsters like Al Capone, and baseball players to 'take the waters.'",
   descZh:"历史最悠久、面积最小的国家公园之一，保护143°F天然温泉，早在1832年便成为联邦保护地。著名的<strong>浴场街</strong>上八座华丽浴场（1892至1923年建造）曾吸引总统、Al Capone等黑帮人物和棒球运动员前来\"泡温泉\"。"},
  {id:55,name:"Gateway Arch",zh:"门户拱门国家公园",state:"MO",lat:38.6247,lng:-90.1848,year:2018,rating:4.5,visitors:2400000,acres:91,
   desc:"Gateway Arch National Park is dominated by the <strong>Gateway Arch</strong>—at 630 feet the tallest man-made monument in the United States and the tallest arch in the world. Designed by Eero Saarinen and completed in 1965, the arch commemorates westward expansion. Visitors ride tram cars inside the structure to an observation deck at the top.",
   descZh:"以<strong>门户拱门</strong>为主体——高630英尺，是美国最高的人工纪念碑，也是世界最高的拱形建筑。由埃罗·沙里宁设计，1965年竣工，纪念美国西进运动。游客可乘吊车到达顶部观景台。"},
  {id:56,name:"Haleakalā",zh:"哈莱阿卡拉国家公园",state:"HI",lat:20.7204,lng:-156.1552,year:1961,rating:4.8,visitors:1000000,acres:33265,
   desc:"Haleakalā, 'House of the Sun' in Hawaiian, protects the dormant volcano forming more than 75% of Maui. The massive <strong>Haleakalā Crater</strong>—7 miles long and 2 miles wide—is one of the most otherworldly landscapes in the national park system. The summit sunrise draws visitors who make 3am reservations months in advance.",
   descZh:"夏威夷语意为\"太阳之屋\"，保护构成毛伊岛75%以上的休眠火山。宏大的<strong>哈莱阿卡拉火山口</strong>长7英里、宽2英里，是公园系统中最超现实的景观之一。山顶日出壮美，游客需提前数月预约凌晨3点的入场许可。"},
  {id:57,name:"Virgin Islands",zh:"维尔京群岛国家公园",state:"VI",lat:18.3448,lng:-64.7847,year:1956,rating:4.8,visitors:146000,acres:14940,
   desc:"Virgin Islands National Park encompasses about two-thirds of St. John in the U.S. Virgin Islands. With turquoise waters, white sand beaches, and coral reefs, it is one of the most scenically beautiful parks. <strong>Trunk Bay</strong>, with its underwater snorkeling trail, is consistently ranked among the most beautiful beaches in the world.",
   descZh:"涵盖美属维尔京群岛圣约翰岛的约三分之二，以碧绿海水、白色沙滩和珊瑚礁成为公园系统中景色最迷人的公园之一。<strong>特朗克湾</strong>拥有水下浮潜步道，持续被评为世界最美海滩之一。"},
  {id:58,name:"American Samoa",zh:"美属萨摩亚国家公园",state:"AS",lat:-14.259,lng:-170.7121,year:1988,rating:4.7,visitors:8000,acres:13500,
   desc:"National Park of American Samoa is the only U.S. national park south of the equator, protecting a unique tropical ecosystem. The park protects pristine coral reefs, tropical rainforest, and sandy beaches accessible only by boat. <strong>Flying foxes</strong> (large fruit bats), the only native land mammals of American Samoa, are a keystone species here.",
   descZh:"美国唯一位于赤道以南的国家公园，保护三个岛屿的独特热带生态系统。保护原始珊瑚礁、热带雨林和只能乘船到达的沙滩。<strong>果蝠</strong>（大型水果蝙蝠）是美属萨摩亚唯一的本地陆地哺乳动物。"},
  {id:59,name:"Kobuk Valley",zh:"科布克谷国家公园",state:"AK",lat:67.3462,lng:-159.1237,year:1980,rating:4.7,visitors:15000,acres:1750717,
   desc:"Kobuk Valley in northwestern Alaska is one of the most remote and least visited national parks, accessible only by small aircraft. The park has no roads, trails, or facilities. Its centerpiece is the <strong>Great Kobuk Sand Dunes</strong>, an extraordinary field of active Arctic sand dunes—some rising 100 feet—formed from glacially ground quartz.",
   descZh:"阿拉斯加西北部，只能乘小型飞机进入，是公园系统中最偏远、游客最少的公园之一。无公路、步道或设施。核心是<strong>大科布克沙丘</strong>——令人惊叹的北极活动沙丘，部分高达100英尺，由冰川研磨石英砂在风力作用下堆积。"},
  {id:60,name:"Lake Clark",zh:"湖克拉克国家公园",state:"AK",lat:60.4127,lng:-153.5541,year:1980,rating:4.8,visitors:20000,acres:2619733,
   desc:"Lake Clark National Park encompasses an extraordinary diversity of landscape—active volcanoes, glaciers, wild rivers, alpine tundra, and a dramatic Cook Inlet coastline where brown bears gather to fish for sockeye salmon. <strong>Mount Redoubt</strong>, an active stratovolcano within the park, erupted as recently as 2009.",
   descZh:"涵盖令人惊叹的多样景观——活火山、冰川、激流、高山冻原和库克湾沿岸海岸线，每年夏天棕熊聚集捕食红鲑鱼。公园内的活成层火山<strong>雷杜布特山</strong>最近一次喷发于2009年。只能乘小型飞机前往。"}

// WIKIMEDIA PHOTO
// ══════════════════════════════════════════
const photoCache = {};

async function fetchParkPhoto(park) {
  const key = park.name;
  if (photoCache[key] !== undefined) return photoCache[key];

  // Try Wikipedia page images first (most reliable)
  const term = encodeURIComponent(`${park.name} National Park`);
  try {
    const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${term}&prop=pageimages&pithumbsize=700&format=json&origin=*`);
    const data = await res.json();
    const pages = data.query.pages;
    const page = Object.values(pages)[0];
    if (page.thumbnail && page.thumbnail.source) {
      const result = { src: page.thumbnail.source };
      photoCache[key] = result;
      return result;
    }
  } catch(e) {}

  photoCache[key] = null;
  return null;
}

async function loadParkPhoto(park) {
  const img = document.getElementById('detail-photo');
  const placeholder = document.getElementById('photo-placeholder');
  const credit = document.getElementById('photo-credit');
  const loadingTxt = document.getElementById('photo-loading-text');

  img.classList.remove('loaded');
  img.src = '';
  placeholder.style.display = 'flex';
  loadingTxt.textContent = T('photoLoading');
  credit.innerHTML = '';

  const photo = await fetchParkPhoto(park);

  if (photo) {
    img.onload = () => {
      img.classList.add('loaded');
      placeholder.style.display = 'none';
    };
    img.onerror = () => {
      placeholder.style.display = 'flex';
      loadingTxt.textContent = T('noPhoto');
    };
    img.src = photo.src;
    credit.innerHTML = `<a href="https://en.wikipedia.org/wiki/${encodeURIComponent(park.name + '_National_Park')}" target="_blank" rel="noopener">${T('photoVia')}</a>`;
  } else {
    loadingTxt.textContent = T('noPhoto');
  }
}

// ══════════════════════════════════════════
// MAP BOUNDS  — covers contiguous US + AK + HI + VI + AS
// ══════════════════════════════════════════
const USA_BOUNDS = L.latLngBounds(
  L.latLng(-18, -180),
  L.latLng(72, -60)
);

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let map, markerMap = {}, currentSort = 'name', activeId = null, sidebarOpen = true;
let filtered = [...PARKS];

// ══════════════════════════════════════════
// MAP INIT
// ══════════════════════════════════════════
function initMap() {
  map = L.map('map', {
    center: [39.5, -98.35],
    zoom: 4,
    minZoom: 3,
    maxZoom: 15,
    maxBounds: USA_BOUNDS,
    maxBoundsViscosity: 0.85,
    zoomControl: true,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  map.on('mousemove', e => {
    const lat = e.latlng.lat.toFixed(4);
    const lng = Math.abs(e.latlng.lng).toFixed(4);
    const ew = e.latlng.lng < 0 ? 'W' : 'E';
    document.getElementById('status-coord').textContent = `${lat}°N  ${lng}°${ew}`;
  });

  PARKS.forEach(park => {
    const el = document.createElement('div');
    el.className = 'custom-marker';
    el.title = park.name;

    const marker = L.marker([park.lat, park.lng], {
      icon: L.divIcon({ className: '', html: el, iconSize: [14,14], iconAnchor: [7,7] })
    }).addTo(map);

    marker.bindPopup(() => `
      <div class="popup-name">${lang === 'zh' ? park.zh : park.name + ' NP'}</div>
      <div class="popup-meta">📍 ${park.state} &nbsp;·&nbsp; Est. ${park.year}</div>
      <div class="popup-meta">${renderStars(park.rating)} ${park.rating} &nbsp;·&nbsp; ${formatNum(park.visitors)}${T('visitorsUnit')}</div>
      <div class="popup-click">${T('clickExplore')}</div>
    `, { maxWidth: 220 });

    marker.on('click', () => openDetail(park.id));
    markerMap[park.id] = { marker, el };
  });
}

// ══════════════════════════════════════════
// FILTERS & SORT
// ══════════════════════════════════════════
function populateStateFilter() {
  const sel = document.getElementById('filter-state');
  const states = [...new Set(PARKS.flatMap(p => p.state.split('/')))].sort();
  while (sel.options.length > 1) sel.remove(1);
  states.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const state = document.getElementById('filter-state').value;
  const year = +document.getElementById('year-range').value;
  filtered = PARKS.filter(p => {
    const matchQ = p.name.toLowerCase().includes(q) || p.zh.includes(q) || p.state.toLowerCase().includes(q);
    return matchQ && (!state || p.state.includes(state)) && p.year <= year;
  });
  renderList();
  updateMarkers();
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-state').value = '';
  document.getElementById('year-range').value = 2020;
  updateYearLabel();
  filtered = [...PARKS];
  renderList();
  updateMarkers();
}

function updateYearLabel() {
  document.getElementById('year-label').textContent = document.getElementById('year-range').value;
}

function setSort(key, btn) {
  currentSort = key;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function sortedFiltered() {
  return [...filtered].sort((a,b) => {
    if (currentSort === 'name') return (lang==='zh'?a.zh:a.name).localeCompare(lang==='zh'?b.zh:b.name);
    if (currentSort === 'rating') return b.rating - a.rating;
    if (currentSort === 'year') return a.year - b.year;
    if (currentSort === 'visitors') return b.visitors - a.visitors;
  });
}

// ══════════════════════════════════════════
// RENDER LIST
// ══════════════════════════════════════════
function renderList() {
  const list = document.getElementById('park-list');
  const sorted = sortedFiltered();
  document.getElementById('park-count').textContent = `${sorted.length} ${T('parksUnit')}`;
  document.getElementById('status-visible').textContent = `${sorted.length} ${T('visibleUnit')}`;
  list.innerHTML = sorted.map((p,i) => `
    <div class="park-item ${p.id===activeId?'active':''}" onclick="openDetail(${p.id})">
      <div class="park-rank">${String(i+1).padStart(2,'0')}</div>
      <div class="park-item-body">
        <div class="park-item-name">${lang==='zh'?p.zh:p.name}</div>
        <div class="park-item-meta">
          <span class="park-item-state">${p.state}</span>
          <span>${p.year}</span>
          <span>${renderStars(p.rating)}</span>
          <span>${formatNum(p.visitors)}${T('visitorsUnit')}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function updateMarkers() {
  const visIds = new Set(filtered.map(p=>p.id));
  Object.entries(markerMap).forEach(([id,{el}]) => el.classList.toggle('dimmed', !visIds.has(+id)));
}

// ══════════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════════
function openDetail(id) {
  const park = PARKS.find(p=>p.id===id);
  if (!park) return;
  activeId = id;
  refreshDetailText(park);
  loadParkPhoto(park);
  document.getElementById('detail-panel').classList.add('open');
  map.flyTo([park.lat, park.lng], 8, { duration: 1.2 });
  markerMap[id].marker.openPopup();
  Object.entries(markerMap).forEach(([mid,{el}]) => el.classList.toggle('highlight', +mid===id));
  renderList();
}

function refreshDetailText(park) {
  if (!park) park = PARKS.find(p=>p.id===activeId);
  if (!park) return;
  const zh = lang==='zh';
  document.getElementById('detail-title').textContent = zh ? park.zh : `${park.name} National Park`;
  document.getElementById('detail-subtitle').textContent = `📍 ${park.state}  ·  Est. ${park.year}  ·  ${formatAcres(park.acres)}`;
  document.getElementById('detail-stats').innerHTML = `
    <div class="stat-block"><div class="stat-label">${T('statRating')}</div><div class="stat-val"><span class="accent">${renderStars(park.rating)} ${park.rating}</span></div></div>
    <div class="stat-block"><div class="stat-label">${T('statVisitors')}</div><div class="stat-val"><span class="green">${formatNum(park.visitors)}</span></div></div>
    <div class="stat-block"><div class="stat-label">${T('statArea')}</div><div class="stat-val">${formatAcres(park.acres)}</div></div>
    <div class="stat-block"><div class="stat-label">${T('statEst')}</div><div class="stat-val">${park.year}</div></div>
    <div class="stat-block"><div class="stat-label">${T('statState')}</div><div class="stat-val">${park.state}</div></div>
  `;
  document.getElementById('detail-desc').innerHTML = zh ? park.descZh : park.desc;
  const credit = document.getElementById('photo-credit');
  if (credit.innerHTML) {
    const a = credit.querySelector('a');
    if (a) a.textContent = T('photoVia');
  }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  activeId = null;
  Object.values(markerMap).forEach(({el}) => el.classList.remove('highlight'));
  renderList();
}

// ══════════════════════════════════════════
// SIDEBAR TOGGLE
// ══════════════════════════════════════════
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  const btn = document.getElementById('sidebar-toggle');
  btn.textContent = sidebarOpen ? '▶' : '◀';
  btn.classList.toggle('collapsed', !sidebarOpen);
  btn.style.right = sidebarOpen ? 'var(--panel-width)' : '0';
  document.getElementById('detail-panel').style.right = sidebarOpen ? 'var(--panel-width)' : '0';
  document.getElementById('status-bar').style.right = sidebarOpen ? 'var(--panel-width)' : '0';
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function renderStars(r) { const f=Math.round(r); return '★'.repeat(f)+'☆'.repeat(5-f); }
function formatNum(n) {
  if (n>=1000000) return (n/1000000).toFixed(1)+'M';
  if (n>=1000) return (n/1000).toFixed(0)+'K';
  return n.toString();
}
function formatAcres(a) {
  if (lang==='zh') return `${(a*0.404686/10000).toFixed(1)}万公顷`;
  if (a>=1000000) return (a/1000000).toFixed(2)+'M acres';
  return a.toLocaleString()+' acres';
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  populateStateFilter();
  initMap();
  renderList();
});
</script>
</body>
</html>
