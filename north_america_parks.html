// ══════════════════════════════════════════
// WIKI URL HELPERS
// ══════════════════════════════════════════
function wikiRestTitle(park) {
  const n = park.name;
  if (park.country === "CA") {
    const special = {
      "Gwaii Haanas": "Gwaii_Haanas_National_Park_Reserve_and_Haida_Heritage_Site",
      "Kluane": "Kluane_National_Park_and_Reserve",
      "Gulf Islands": "Gulf_Islands_National_Park_Reserve",
      "Pacific Rim": "Pacific_Rim_National_Park_Reserve",
      "Nahanni": "Nahanni_National_Park_Reserve",
      "Glacier": "Glacier_National_Park_(Canada)",
      "Mingan Archipelago": "Mingan_Archipelago_National_Park_Reserve",
      "Thaidene N\u00ebn\u00e9": "Thaidene_N%C3%ABn%C3%A9_National_Park_Reserve",
      "N\u00e1\u00e1ts'ihch'oh": "N%C3%A1%C3%A1ts%27ihch%27oh_National_Park_Reserve",
      "Akami-Uapishku-KakKasuak-Mealy Mountains": "Akami%E2%88%92Uapishk%E1%B5%98%E2%88%92KakKasuak%E2%88%92Mealy_Mountains_National_Park_Reserve"
    };
    return special[n] || encodeURIComponent(n.replace(/ /g,"_") + "_National_Park");
  } else {
    const special = {
      "Haleak\u0101l\u0101": "Haleakal%C4%81_National_Park",
      "Hawaii Volcanoes": "Hawaii_Volcanoes_National_Park",
      "Wrangell-St. Elias": "Wrangell%E2%80%93St._Elias_National_Park_and_Preserve",
      "Gates of the Arctic": "Gates_of_the_Arctic_National_Park_and_Preserve",
      "Katmai": "Katmai_National_Park_and_Preserve",
      "Lake Clark": "Lake_Clark_National_Park_and_Preserve",
      "New River Gorge": "New_River_Gorge_National_Park_and_Preserve"
    };
    return special[n] || encodeURIComponent(n.replace(/ /g,"_") + "_National_Park");
  }
}

function wikiUrl(park) {
  return "https://en.wikipedia.org/wiki/" + wikiRestTitle(park);
}

// ══════════════════════════════════════════
// PHOTO CACHE & FETCH
// Uses Wikipedia REST API (rest_v1/page/summary) — faster, CDN-cached, returns wiki URL too
// 4s AbortController timeout, pending-dedup, background preload
// ══════════════════════════════════════════
const photoCache = {};  // id → {src, pageUrl} | null | "pending"

async function fetchParkPhoto(park) {
  const key = park.id;
  // Already resolved
  if (photoCache[key] !== undefined && photoCache[key] !== "pending") return photoCache[key];
  // In-flight: wait for it
  if (photoCache[key] === "pending") {
    return new Promise(resolve => {
      const t = setInterval(() => {
        if (photoCache[key] !== "pending") { clearInterval(t); resolve(photoCache[key]); }
      }, 80);
      setTimeout(() => { clearInterval(t); resolve(photoCache[key] || null); }, 5000);
    });
  }
  photoCache[key] = "pending";
  const title = wikiRestTitle(park);
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 4000);
  try {
    const res = await fetch(
      "https://en.wikipedia.org/api/rest_v1/page/summary/" + title,
      { signal: controller.signal }
    );
    clearTimeout(timer);
    if (res.ok) {
      const data = await res.json();
      if (data.thumbnail && data.thumbnail.source) {
        // Request larger image by bumping px in URL
        const src = data.thumbnail.source.replace(/\/\d+px-/, "/800px-");
        const result = { src, pageUrl: data.content_urls?.desktop?.page || wikiUrl(park) };
        photoCache[key] = result;
        return result;
      }
    }
  } catch(e) { clearTimeout(timer); }
  photoCache[key] = null;
  return null;
}

async function loadParkPhoto(park) {
  const img = document.getElementById("detail-photo");
  const placeholder = document.getElementById("photo-placeholder");
  const credit = document.getElementById("photo-credit");
  img.classList.remove("loaded");
  img.src = "";
  placeholder.style.display = "flex";
  document.getElementById("photo-loading-text").textContent = T("photoLoading");
  credit.innerHTML = "";
  const photo = await fetchParkPhoto(park);
  if (photo && photo.src) {
    img.onload = () => { img.classList.add("loaded"); placeholder.style.display = "none"; };
    img.onerror = () => { placeholder.style.display = "flex"; document.getElementById("photo-loading-text").textContent = T("noPhoto"); };
    img.src = photo.src;
    credit.innerHTML = `<a href="${photo.pageUrl}" target="_blank" rel="noopener">${T("photoVia")}</a>`;
  } else {
    document.getElementById("photo-loading-text").textContent = T("noPhoto");
  }
}

// Silent background preload for the first N parks in the current list
function preloadVisiblePhotos() {
  const batch = filtered.slice(0, 18);
  let i = 0;
  function next() {
    if (i >= batch.length) return;
    const park = batch[i++];
    if (photoCache[park.id] === undefined) {
      fetchParkPhoto(park).finally(() => setTimeout(next, 250));
    } else { next(); }
  }
  setTimeout(next, 2000);  // start 2s after page load, giving map time to settle
}

// ══════════════════════════════════════════
// MAP BOUNDS — North America (US + Canada + Mexico)
// ══════════════════════════════════════════
const NA_BOUNDS = L.latLngBounds(L.latLng(-10, -180), L.latLng(84, -50));

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let map, markerMap={}, currentSort="name", activeId=null, sidebarOpen=true;
let filtered=[...PARKS];

// ══════════════════════════════════════════
// MAP INIT
// ══════════════════════════════════════════
function initMap() {
  map = L.map("map", {
    center:[54, -97], zoom:3, minZoom:2, maxZoom:15,
    maxBounds:NA_BOUNDS, maxBoundsViscosity:0.85,
    zoomControl:true, attributionControl:false
  });
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {maxZoom:19}).addTo(map);
  map.on("mousemove", e => {
    const lat=e.latlng.lat.toFixed(4), lng=Math.abs(e.latlng.lng).toFixed(4), ew=e.latlng.lng<0?"W":"E";
    document.getElementById("status-coord").textContent = lat+"°N  "+lng+"°"+ew;
  });
  PARKS.forEach(park => {
    const el = document.createElement("div");
    el.className = "custom-marker " + park.country.toLowerCase();
    el.title = park.name;
    const marker = L.marker([park.lat, park.lng], {
      icon: L.divIcon({className:"", html:el, iconSize:[10,10], iconAnchor:[5,5]})
    }).addTo(map);
    marker.bindPopup(() => {
      const frLine = park.nameFr ? `<div class="popup-name-fr">${park.nameFr}</div>` : "";
      const popupName = lang==="zh" ? park.zh : park.name;
      return `<div class="popup-name"><a href="${wikiUrl(park)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none;" title="Wikipedia">${popupName} ↗</a></div>${frLine}<div class="popup-meta">📍 ${park.region} &nbsp;·&nbsp; Est. ${park.year}</div><div class="popup-meta">${renderStars(park.rating)} ${park.rating} &nbsp;·&nbsp; ${fmtV(park.visitors)}${T("visitorsUnit")}</div>`;
    }, {maxWidth:230});
    marker.on("click", ()=>openDetail(park.id));
    markerMap[park.id]={marker, el};
  });
}

// ══════════════════════════════════════════
// REGION FILTER — dynamic based on country selection
// ══════════════════════════════════════════
function populateRegions() {
  const country = document.getElementById("filter-country").value;
  const sel = document.getElementById("filter-region");
  const cur = sel.value;
  while(sel.options.length > 1) sel.remove(1);
  const regions = [...new Set(
    PARKS.filter(p => !country || p.country === country)
      .map(p => p.region).flatMap(r => r.split("/"))
  )].sort();
  regions.forEach(r => {
    const o = document.createElement("option");
    o.value = r; o.textContent = r; sel.appendChild(o);
  });
  // restore selection if still valid
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
}

// ══════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════
function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase();
  const country = document.getElementById("filter-country").value;
  const region = document.getElementById("filter-region").value;
  const year = +document.getElementById("year-range").value;
  filtered = PARKS.filter(p => {
    const matchQ = p.name.toLowerCase().includes(q) || p.zh.includes(q) || p.region.toLowerCase().includes(q) || (p.nameFr && p.nameFr.toLowerCase().includes(q));
    const matchC = !country || p.country === country;
    const matchR = !region || p.region.includes(region);
    const matchY = p.year <= year;
    return matchQ && matchC && matchR && matchY;
  });
  renderList();
  updateMarkers();
}

function resetFilters() {
  document.getElementById("search").value = "";
  document.getElementById("filter-country").value = "";
  document.getElementById("filter-region").value = "";
  document.getElementById("year-range").value = 2024;
  updateYearLabel();
  populateRegions();
  filtered = [...PARKS];
  renderList();
  updateMarkers();
}

function updateYearLabel() {
  document.getElementById("year-label").textContent = document.getElementById("year-range").value;
}

function setSort(key, btn) {
  currentSort = key;
  document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderList();
}

function sortedFiltered() {
  return [...filtered].sort((a,b) => {
    if(currentSort==="name") return (lang==="zh"?a.zh:a.name).localeCompare(lang==="zh"?b.zh:b.name);
    if(currentSort==="rating") return b.rating-a.rating;
    if(currentSort==="year") return a.year-b.year;
    if(currentSort==="visitors") return b.visitors-a.visitors;
  });
}

// ══════════════════════════════════════════
// RENDER LIST
// ══════════════════════════════════════════
function renderList() {
  const list = document.getElementById("park-list");
  const sorted = sortedFiltered();
  const usCount = sorted.filter(p=>p.country==="US").length;
  const caCount = sorted.filter(p=>p.country==="CA").length;
  document.getElementById("park-count").textContent = `${sorted.length} ${T("parksUnit")}`;
  document.getElementById("status-visible").textContent = `${sorted.length} ${T("visibleUnit")} (🇺🇸${usCount} 🇨🇦${caCount})`;

  list.innerHTML = sorted.map((p,i) => {
    const frLine = (lang==="en" && p.nameFr) ? `<div class="park-item-fr">${p.nameFr}</div>` : "";
    const displayName = lang==="zh" ? p.zh : p.name;
    const wikiHref = wikiUrl(p);
    return `<div class="park-item ${p.country.toLowerCase()} ${p.id===activeId?"active":""}" onclick="openDetail(${p.id})">
      <div class="park-rank">${String(i+1).padStart(2,"0")}</div>
      <div class="park-item-body">
        <div class="park-item-name">
          ${displayName}
          <a href="${wikiHref}" target="_blank" rel="noopener" class="wiki-link" onclick="event.stopPropagation()" title="Wikipedia">↗</a>
        </div>
        ${frLine}
        <div class="park-item-meta">
          <span class="badge ${p.country.toLowerCase()}">${p.country==="US"?"🇺🇸 US":"🇨🇦 CA"}</span>
          <span style="color:${p.country==="CA"?"var(--accent-ca)":"var(--accent)"}">${p.region}</span>
          <span>${p.year}</span>
          <span>${renderStars(p.rating)}</span>
          <span>${fmtV(p.visitors)}${T("visitorsUnit")}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function updateMarkers() {
  const visIds = new Set(filtered.map(p=>p.id));
  Object.entries(markerMap).forEach(([id,{el}]) => el.classList.toggle("dimmed", !visIds.has(+id)));
}

// ══════════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════════
function openDetail(id) {
  const park = PARKS.find(p=>p.id===id);
  if(!park) return;
  activeId = id;
  refreshDetailText(park);
  loadParkPhoto(park);
  document.getElementById("detail-panel").classList.add("open");
  map.flyTo([park.lat, park.lng], park.country==="CA"?6:8, {duration:1.2});
  markerMap[id].marker.openPopup();
  Object.entries(markerMap).forEach(([mid,{el}]) => el.classList.toggle("highlight", +mid===id));
  renderList();
}

function refreshDetailText(park) {
  if(!park) park = PARKS.find(p=>p.id===activeId);
  if(!park) return;
  const zh = lang==="zh";
  const displayName = zh ? park.zh : park.name + " National Park";
  // Title with wiki link
  const titleEl = document.getElementById("detail-title");
  titleEl.innerHTML = `${displayName} <a href="${wikiUrl(park)}" target="_blank" rel="noopener" class="wiki-link-title" title="Wikipedia">↗</a>`;
  // French name line — shown in English mode only
  const frEl = document.getElementById("detail-title-fr");
  frEl.textContent = (lang==="en" && park.nameFr) ? park.nameFr : "";
  // Subtitle
  const flag = park.country==="US" ? "🇺🇸" : "🇨🇦";
  const countryName = zh ? (park.country==="US"?T("countryUS"):T("countryCA")) : (park.country==="US"?"United States":"Canada");
  document.getElementById("detail-subtitle").textContent = `${flag} ${countryName}  ·  ${park.region}  ·  Est. ${park.year}  ·  ${fmtArea(park.areakm)}`;
  // Stats
  const valClass = park.country==="CA" ? "blue" : "green";
  document.getElementById("detail-stats").innerHTML = `
    <div class="stat-block"><div class="stat-label">${T("statRating")}</div><div class="stat-val"><span class="accent">${renderStars(park.rating)} ${park.rating}</span></div></div>
    <div class="stat-block"><div class="stat-label">${T("statVisitors")}</div><div class="stat-val"><span class="${valClass}">${fmtV(park.visitors)}</span></div></div>
    <div class="stat-block"><div class="stat-label">${T("statArea")}</div><div class="stat-val">${fmtArea(park.areakm)}</div></div>
    <div class="stat-block"><div class="stat-label">${T("statEst")}</div><div class="stat-val">${park.year}</div></div>
    <div class="stat-block"><div class="stat-label">${T("statLoc")}</div><div class="stat-val">${park.region}</div></div>
  `;
  // Description
  const desc = zh ? park.descZh : park.desc;
  document.getElementById("detail-desc").innerHTML = desc;
  // photo credit refresh
  const credit = document.getElementById("photo-credit");
  if(credit.innerHTML){const a=credit.querySelector("a");if(a)a.textContent=T("photoVia");}
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("open");
  activeId = null;
  Object.values(markerMap).forEach(({el})=>el.classList.remove("highlight"));
  renderList();
}

// ══════════════════════════════════════════
// SIDEBAR TOGGLE
// ══════════════════════════════════════════
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById("sidebar").classList.toggle("collapsed", !sidebarOpen);
  const btn = document.getElementById("sidebar-toggle");
  btn.textContent = sidebarOpen ? "▶" : "◀";
  btn.classList.toggle("collapsed", !sidebarOpen);
  btn.style.right = sidebarOpen ? "var(--panel-width)" : "0";
  document.getElementById("detail-panel").style.right = sidebarOpen ? "var(--panel-width)" : "0";
  document.getElementById("status-bar").style.right = sidebarOpen ? "var(--panel-width)" : "0";
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function renderStars(r){const f=Math.round(r);return "★".repeat(f)+"☆".repeat(5-f);}
function fmtV(n){if(n>=1000000)return(n/1000000).toFixed(1)+"M";if(n>=1000)return(n/1000).toFixed(0)+"K";return n.toString();}
function fmtArea(km){
  if(lang==="zh"){if(km>=10000)return(km/10000).toFixed(1)+"万平方公里";return km.toLocaleString()+" 平方公里";}
  if(km>=1000)return(km/1000).toFixed(1)+"K km²";return km.toLocaleString()+" km²";
}

// ══════════════════════════════════════════
// MOBILE DETECTION & HELPERS
// ══════════════════════════════════════════
const isMobile = () => window.innerWidth <= 768;

function closeMobileDrawers() {
  document.getElementById("park-drawer").classList.remove("open");
  document.getElementById("filter-drawer").classList.remove("open");
  document.getElementById("mobile-overlay").classList.remove("show");
  document.querySelectorAll(".mnav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("mnav-map").classList.add("active");
}

function mobileNavMap() {
  closeMobileDrawers();
}

function mobileNavList() {
  const drawer = document.getElementById("park-drawer");
  const isOpen = drawer.classList.contains("open");
  closeMobileDrawers();
  if (!isOpen) {
    drawer.classList.add("open");
    document.getElementById("mobile-overlay").classList.add("show");
    document.getElementById("mnav-list").classList.add("active");
    document.getElementById("mnav-map").classList.remove("active");
    renderMobileList();
  }
}

function mobileNavFilter() {
  const drawer = document.getElementById("filter-drawer");
  const isOpen = drawer.classList.contains("open");
  closeMobileDrawers();
  if (!isOpen) {
    drawer.classList.add("open");
    document.getElementById("mobile-overlay").classList.add("show");
    document.getElementById("mnav-filter").classList.add("active");
    document.getElementById("mnav-map").classList.remove("active");
  }
}

// Keep desktop + mobile filter inputs in sync
function syncFilters() {
  if (isMobile()) {
    const ms = document.getElementById("m-search");
    const mc = document.getElementById("m-filter-country");
    const mr = document.getElementById("m-filter-region");
    const my = document.getElementById("m-year-range");
    if (ms) document.getElementById("search").value = ms.value;
    if (mc) document.getElementById("filter-country").value = mc.value;
    if (mr) document.getElementById("filter-region").value = mr.value;
    if (my) document.getElementById("year-range").value = my.value;
  }
}

function resetMobileFilters() {
  ["m-search"].forEach(id => { const el = document.getElementById(id); if(el) el.value = ""; });
  ["m-filter-country","m-filter-region"].forEach(id => { const el = document.getElementById(id); if(el) el.value = ""; });
  const my = document.getElementById("m-year-range");
  if (my) { my.value = 2024; document.getElementById("m-year-label").textContent = "2024"; }
  syncFilters();
  resetFilters();
  renderMobileList();
}

// Mobile park list render (uses same PARKS + filtered data)
function renderMobileList() {
  if (!isMobile()) return;
  const list = document.getElementById("drawer-list");
  if (!list) return;
  const sorted = sortedFiltered();
  document.getElementById("drawer-park-count").textContent = `${sorted.length} ${T("parksUnit")}`;
  list.innerHTML = sorted.map((p, i) => {
    const displayName = lang === "zh" ? p.zh : p.name;
    return `<div class="park-item ${p.country.toLowerCase()}" onclick="openMobileDetail(${p.id})" style="padding:12px 16px">
      <div class="park-rank">${String(i+1).padStart(2,"0")}</div>
      <div class="park-item-body">
        <div class="park-item-name" style="font-size:14px">${displayName}</div>
        <div class="park-item-meta" style="margin-top:3px">
          <span class="badge ${p.country.toLowerCase()}">${p.country==="US"?"🇺🇸":"🇨🇦"}</span>
          <span style="color:${p.country==="CA"?"var(--accent-ca)":"var(--accent)"}">${p.region}</span>
          <span>${p.year}</span>
          <span>${renderStars(p.rating)}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

// Mobile detail panel
function openMobileDetail(id) {
  const park = PARKS.find(p => p.id === id);
  if (!park) return;
  activeId = id;

  // Close list drawer first
  document.getElementById("park-drawer").classList.remove("open");
  document.getElementById("mobile-overlay").classList.remove("show");

  // Populate mobile detail
  const zh = lang === "zh";
  const displayName = zh ? park.zh : park.name + " National Park";
  document.getElementById("mobile-detail-title").innerHTML =
    `${displayName} <a href="${wikiUrl(park)}" target="_blank" rel="noopener" style="color:var(--text-dim);font-size:13px;text-decoration:none;opacity:.6">↗</a>`;
  const frEl = document.getElementById("mobile-detail-title-fr");
  frEl.textContent = (lang === "en" && park.nameFr) ? park.nameFr : "";
  const flag = park.country === "US" ? "🇺🇸" : "🇨🇦";
  document.getElementById("mobile-detail-subtitle").textContent =
    `${flag} ${park.region}  ·  Est. ${park.year}  ·  ${fmtArea(park.areakm)}`;

  const valClass = park.country === "CA" ? "blue" : "green";
  document.getElementById("mobile-detail-stats").innerHTML = [
    [T("statRating"), `<span class="accent">${renderStars(park.rating)} ${park.rating}</span>`],
    [T("statVisitors"), `<span class="${valClass}">${fmtV(park.visitors)}${T("visitorsUnit")}</span>`],
    [T("statArea"), fmtArea(park.areakm)],
    [T("statEst"), park.year],
    [T("statLoc"), park.region],
    [T("statCountry"), zh ? (park.country==="US"?T("countryUS"):T("countryCA")) : (park.country==="US"?"United States":"Canada")]
  ].map(([label, val]) =>
    `<div class="mobile-stat"><div class="stat-label">${label}</div><div class="stat-val">${val}</div></div>`
  ).join("");

  document.getElementById("mobile-detail-desc").innerHTML = zh ? park.descZh : park.desc;

  // Reset photo
  const mImg = document.getElementById("mobile-detail-photo");
  const mPlaceholder = document.getElementById("mobile-photo-placeholder");
  const mCredit = document.getElementById("mobile-photo-credit");
  mImg.classList.remove("loaded"); mImg.src = "";
  mPlaceholder.style.display = "flex";
  document.getElementById("mobile-photo-loading-text").textContent = T("photoLoading");
  mCredit.innerHTML = "";

  // Show panel
  document.getElementById("mobile-detail").classList.add("open");

  // Fly map
  map.flyTo([park.lat, park.lng], park.country === "CA" ? 6 : 8, { duration: 1.0 });
  if (markerMap[id]) markerMap[id].marker.openPopup();

  // Load photo
  fetchParkPhoto(park).then(photo => {
    if (photo && photo.src) {
      mImg.onload = () => { mImg.classList.add("loaded"); mPlaceholder.style.display = "none"; };
      mImg.onerror = () => { document.getElementById("mobile-photo-loading-text").textContent = T("noPhoto"); };
      mImg.src = photo.src;
      mCredit.innerHTML = `<a href="${photo.pageUrl}" target="_blank" rel="noopener">${T("photoVia")}</a>`;
    } else {
      document.getElementById("mobile-photo-loading-text").textContent = T("noPhoto");
    }
  });
}

function closeMobileDetail() {
  document.getElementById("mobile-detail").classList.remove("open");
  activeId = null;
}

// Override openDetail on mobile to use mobile panel instead
const _openDetailOriginal = openDetail;
function openDetail(id) {
  if (isMobile()) { openMobileDetail(id); return; }
  _openDetailOriginal(id);
}

function updateMobileLangBtn() {
  const lbl = document.getElementById("m-lang-btn-label");
  if (lbl) lbl.textContent = lang === "en" ? "Switch to 中文" : "切换为 English";
}


// Populate mobile region dropdown when country changes
function populateMobileRegions() {
  const country = document.getElementById("m-filter-country")?.value || "";
  const sel = document.getElementById("m-filter-region");
  if (!sel) return;
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  const regions = [...new Set(
    PARKS.filter(p => !country || p.country === country)
      .map(p => p.region).flatMap(r => r.split("/"))
  )].sort();
  regions.forEach(r => { const o = document.createElement("option"); o.value = r; o.textContent = r; sel.appendChild(o); });
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
}

document.addEventListener("DOMContentLoaded", () => {
  populateRegions();
  initMap();
  renderList();
  preloadVisiblePhotos();
  // Mobile: hook country select to repopulate regions
  const mc = document.getElementById("m-filter-country");
  if (mc) mc.addEventListener("change", populateMobileRegions);
  updateMobileLangBtn();
});
</script>
